    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ff6b35 0%, #d4443a 25%, #8b0000 50%, #d4443a 75%, #ff6b35 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #333;
            overflow-x: hidden;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .container {
            text-align: center;
            max-width: 600px;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.8s ease-out;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .leo-symbol {
            font-size: 80px;
            margin-bottom: 1rem;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        h1 {
            font-size: 48px;
            color: #d4443a;
            margin-bottom: 0.5rem;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }
        .subtitle {
            font-size: 24px;
            color: #8b0000;
            margin-bottom: 2rem;
        }
        .decorations {
            font-size: 32px;
            margin: 1.5rem 0;
            letter-spacing: 0.5rem;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .info-box {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            padding: 1.5rem;
            border-radius: 15px;
            margin: 2rem 0;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
        }
        .zodiac-title {
            font-size: 20px;
            color: #8b0000;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }
        .zodiac-text {
            font-size: 16px;
            color: #333;
            line-height: 1.6;
        }
        .wishes-section {
            margin-top: 2rem;
        }
        .wishes-title {
            font-size: 22px;
            color: #d4443a;
            margin-bottom: 1rem;
            font-weight: bold;
        }
        .wish-input {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        input[type="text"] {
            flex: 1;
            padding: 0.75rem;
            border: 2px solid #d4443a;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
        }
        button {
            padding: 0.75rem 1.5rem;
            background: linear-gradient(135deg, #ff6b35 0%, #d4443a 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.05);
        }
        button:active {
            transform: scale(0.95);
        }
        .wishes-list {
            max-height: 200px;
            overflow-y: auto;
            background: #f9f9f9;
            border-radius: 10px;
            padding: 1rem;
            text-align: left;
        }
        .wish-item {
            background: white;
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            border-left: 4px solid #d4443a;
            border-radius: 4px;
            font-size: 14px;
            animation: wishAppear 0.5s ease-out;
        }
        @keyframes wishAppear {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        .visitor-counter {
            font-size: 14px;
            color: #8b0000;
            margin-top: 1.5rem;
            font-weight: bold;
        }
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #ffd700;
            pointer-events: none;
            animation: fall 3s linear forwards;
        }
        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }
        .empty-wishes {
            color: #999;
            font-style: italic;
            padding: 1rem;
        }

<body>
    <div class="container">
        <div class="leo-symbol">♌</div>
        <h1>生日快乐</h1>
        <h1 style="font-size: 56px; margin-top: -0.5rem;">胡怡！</h1>
        <p class="subtitle">🎂 祝你生日快乐！🎂</p>
        
        <div class="decorations">🏮 🧧 ♌ 🧧 🏮</div>
        
        <div class="info-box">
            <div class="zodiac-title">♌ 狮子家族庆典 ♌</div>
            <div class="zodiac-text">
                欢迎来到狮子族的生日盛宴！<br>
                你的热情、勇气和领导力<br>
                如同太阳一样灿烂耀眼。<br>
                祝你的生日闪闪发光！✨
            </div>
        </div>

        <div class="wishes-section">
            <div class="wishes-title">🎈 送上你的祝福 🎈</div>
            <div class="wish-input">
                <input type="text" id="wishInput" placeholder="输入你的祝福..." maxlength="50">
                <button onclick="addWish()">送祝福</button>
            </div>
            <div class="wishes-list" id="wishesList">
                <div class="empty-wishes">暂无祝福，来做第一个吧！</div>
            </div>
        </div>

        <div class="visitor-counter">
            👥 访客数: <span id="visitorCount">0</span> | 
            🎁 祝福数: <span id="wishCount">0</span>
        </div>
    </div>

    <script>
        // Initialize visitor count
        function initializeVisitor() {
            let visitors = localStorage.getItem('huYiBdayVisitors') || '0';
            visitors = parseInt(visitors) + 1;
            localStorage.setItem('huYiBdayVisitors', visitors.toString());
            document.getElementById('visitorCount').textContent = visitors;
            
            // Milestone celebration
            if (visitors === 1 || visitors === 10 || visitors === 100 || visitors === 1000) {
                triggerConfetti();
            }
        }

        // Load wishes from localStorage
        function loadWishes() {
            const wishes = JSON.parse(localStorage.getItem('huYiBdayWishes') || '[]');
            const wishesList = document.getElementById('wishesList');
            
            if (wishes.length === 0) {
                wishesList.innerHTML = '<div class="empty-wishes">暂无祝福，来做第一个吧！</div>';
                return;
            }
            
            wishesList.innerHTML = wishes.map(wish => 
                `<div class="wish-item">${wish}</div>`
            ).join('');
            
            document.getElementById('wishCount').textContent = wishes.length;
        }

        // Add new wish
        function addWish() {
            const input = document.getElementById('wishInput');
            const wish = input.value.trim();
            
            if (!wish) return;
            
            let wishes = JSON.parse(localStorage.getItem('huYiBdayWishes') || '[]');
            if (wishes.length < 50) {
                wishes.unshift(wish);
                localStorage.setItem('huYiBdayWishes', JSON.stringify(wishes));
                input.value = '';
                loadWishes();
                triggerConfetti();
            }
        }

        // Confetti animation
        function triggerConfetti() {
            for (let i = 0; i < 30; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = ['#ffd700', '#ff6b35', '#d4443a', '#8b0000'][Math.floor(Math.random() * 4)];
                confetti.style.animationDelay = Math.random() * 0.5 + 's';
                document.body.appendChild(confetti);
                
                setTimeout(() => confetti.remove(), 3000);
            }
        }

        // Allow Enter key to submit
        document.getElementById('wishInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addWish();
            }
        });

        // Initialize on load
        window.addEventListener('load', () => {
            initializeVisitor();
            loadWishes();
        });
    </script>
</body>
